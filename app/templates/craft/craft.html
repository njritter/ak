{% extends "base.html" %}
{% import "bootstrap_wtf.html" as wtf %}

{% block content %}
    <h1>Projects</h1>
    <br>
    <a href={{ url_for('main.craft') }}>
        <img src="{{ url_for('static', filename='_ak/new_project_small.png') }}" class="image" /></a>
    {% for project in projects %}
    <a href={{ url_for('main.craft_project', project=project.project) }}>
        <img src="{{ url_for('static', filename=project.url_start) }}" class="image" />
    </a>
    {% endfor %}

{% endblock %}
