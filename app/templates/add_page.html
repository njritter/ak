{% extends "base.html" %}
{% import "bootstrap_wtf.html" as wtf %}

{% block content %}
    <h1>Add a new page to current project, {{ current_user.username }}</h1>
    
    {% for page in pages %}
    <a href={{ url_for("main.page", user=page.username, project=page.project, pagenumber=page.number) }}>
    <img src="{{ url_for('static', filename=page.url) }}" class="image" /></a> 
    {% endfor %}

    <br><br>

    {{ wtf.quick_form(form) }}

{% endblock %}
